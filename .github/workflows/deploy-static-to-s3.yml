# Deploy JS/CSS to S3 (minified) and invalidate CloudFront.
# Push: deploys only changed *.js / *.css. workflow_dispatch: optional "Deploy all" to seed bucket.
# Required: GitHub secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Required: GitHub variables AWS_S3_BUCKET, AWS_CLOUDFRONT_DISTRIBUTION_ID
# Optional: AWS_S3_PREFIX (e.g. cdn) if using an existing bucket with a prefix
# Optional: DEPLOY_VERIFY_URL (e.g. https://assets.whiteswan.io) to verify deployment

name: Deploy static assets to S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - '*.js'
      - '*.css'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all JS/CSS (ignore changed files)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-s3-cf
  cancel-in-progress: false  # Queue instead of cancel so each deploy completes (no lost updates)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit for git diff on push

      - name: Get JS/CSS files to deploy
        id: files
        run: |
          # Only deploy root-level *.js and *.css (exclude subdirs like image-trim-api/)
          DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"
          if [ "$DEPLOY_ALL" = "true" ]; then
            FILES=$(git ls-files | grep -E '^[^/]+\.(js|css)$' || true)
          else
            if [ -n "${{ github.event.before }}" ]; then
              FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD 2>/dev/null | grep -E '^[^/]+\.(js|css)$' || true)
              [ -z "$FILES" ] && FILES=$(git ls-files | grep -E '^[^/]+\.(js|css)$' || true)
            else
              FILES=$(git ls-files | grep -E '^[^/]+\.(js|css)$' || true)
            fi
          fi
          echo "Files to deploy:"
          echo "$FILES" | grep -v '^$' || true
          if [ -z "$FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        if: steps.files.outputs.has_files == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Node for minification
        if: steps.files.outputs.has_files == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy and verify (upload → invalidate → verify, retry full deploy if verify fails)
        if: steps.files.outputs.has_files == 'true'
        env:
          BUCKET: ${{ vars.AWS_S3_BUCKET }}
          PREFIX: ${{ vars.AWS_S3_PREFIX }}
          DIST_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
          BASE_URL: ${{ vars.DEPLOY_VERIFY_URL }}
          FILES: ${{ steps.files.outputs.files }}
        run: |
          upload_one() {
            local src="$1" s3_key="$2" extra="$3"
            for u in 1 2 3; do
              aws s3 cp "$src" "s3://${BUCKET}/${s3_key}" $extra && return 0
              [ $u -lt 3 ] && echo "Upload retry $u/3..." && sleep 10
            done
            return 1
          }
          verify_one() {
            local f="$1" url="$2" local_file="$3"
            tmp=$(mktemp)
            curl -sS -f "$url" -o "$tmp" && diff -q "$local_file" "$tmp" >/dev/null
            local r=$?
            rm -f "$tmp"
            return $r
          }
          do_verify() {
            [ -z "$BASE_URL" ] && return 0
            sleep 10
            for v in 1 2 3; do
              [ $v -gt 1 ] && echo "Verify retry $v/3, waiting 15s..." && sleep 15
              all_ok=true
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                url="${BASE_URL%/}/${f}"
                local_file=".minified/$f"
                verify_one "$f" "$url" "$local_file" || all_ok=false
              done <<< "$FILES"
              [ "$all_ok" = true ] && return 0
            done
            return 1
          }
          P="${PREFIX:-}"
          [ -n "$P" ] && P="${P%/}/"
          mkdir -p .minified

          for deploy_attempt in 1 2 3; do
            [ $deploy_attempt -gt 1 ] && echo "=== Full deploy retry $deploy_attempt/3 (verify failed) ===" && sleep 20

            echo "--- Upload ---"
            while IFS= read -r f; do
              [ -z "$f" ] || [ ! -f "$f" ] && continue
              dir=".minified/$(dirname "$f")"
              mkdir -p "$dir"
              s3_key="${P}${f}"
              if [[ "$f" == *.js ]]; then
                npx --yes terser "$f" --compress passes=2 --mangle -o ".minified/$f"
                upload_one ".minified/$f" "$s3_key" "--content-type application/javascript --cache-control public,max-age=86400" || exit 1
              else
                npx --yes clean-css-cli -o ".minified/$f" "$f"
                upload_one ".minified/$f" "$s3_key" "--content-type text/css --cache-control public,max-age=86400" || exit 1
              fi
              echo "Uploaded $s3_key"
            done <<< "$FILES"

            echo "--- Invalidate CloudFront ---"
            for inv in 1 2 3; do
              aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" && break
              [ $inv -lt 3 ] && sleep 15
            done

            echo "--- Verify (compare minified local vs deployed) ---"
            if do_verify; then
              echo "Deploy verified successfully."
              exit 0
            fi
          done
          echo "::error::Deploy failed after 3 attempts (verify: deployed content did not match local minified bundle)"
          exit 1

      - name: Summary
        if: steps.files.outputs.has_files == 'true'
        run: |
          echo "Deployed to S3 + CloudFront:"
          echo "${{ steps.files.outputs.files }}" | tr ' ' '\n' | grep -v '^$'
          echo ""
          echo "Base URL: CloudFront distribution domain or custom domain (e.g. https://assets.whiteswan.io/)"
          echo "Example: https://assets.whiteswan.io/white-swan-bubble-css-classification.js"