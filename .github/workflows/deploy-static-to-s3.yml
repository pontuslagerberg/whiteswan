# Deploy JS/CSS to S3 (minified) and invalidate CloudFront.
# Push: deploys only changed *.js / *.css. workflow_dispatch: optional "Deploy all" to seed bucket.
# Required: GitHub secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Required: GitHub variables AWS_S3_BUCKET, AWS_CLOUDFRONT_DISTRIBUTION_ID
# Optional: AWS_S3_PREFIX (e.g. cdn) if using an existing bucket with a prefix
# Optional: DEPLOY_VERIFY_URL (e.g. https://assets.whiteswan.io) to verify deployment

name: Deploy static assets to S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - '*.js'
      - '*.css'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all JS/CSS (ignore changed files)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-s3-cf
  cancel-in-progress: false  # Queue instead of cancel so each deploy completes (no lost updates)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get JS/CSS files to deploy
        id: files
        run: |
          # Only deploy root-level *.js and *.css (exclude subdirs like image-trim-api/)
          DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"
          if [ "$DEPLOY_ALL" = "true" ]; then
            FILES=$(git ls-files | grep -E '^[^/]+\.(js|css)$' || true)
          else
            if [ -n "${{ github.event.before }}" ]; then
              FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" HEAD | grep -E '^[^/]+\.(js|css)$' || true)
            else
              FILES=$(git ls-files | grep -E '^[^/]+\.(js|css)$' || true)
            fi
          fi
          echo "Files to deploy:"
          echo "$FILES" | grep -v '^$' || true
          if [ -z "$FILES" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        if: steps.files.outputs.has_files == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Node for minification
        if: steps.files.outputs.has_files == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify and upload assets (with retry)
        if: steps.files.outputs.has_files == 'true'
        env:
          BUCKET: ${{ vars.AWS_S3_BUCKET }}
          PREFIX: ${{ vars.AWS_S3_PREFIX }}
        run: |
          upload_with_retry() {
            local max=3 delay=10 attempt=1
            while [ $attempt -le $max ]; do
              echo "Upload attempt $attempt/$max..."
              if "$@"; then return 0; fi
              [ $attempt -lt $max ] && echo "Retrying in ${delay}s..." && sleep $delay && delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
            return 1
          }
          P="${PREFIX:-}"
          [ -n "$P" ] && P="${P%/}/"
          mkdir -p .minified
          echo "${{ steps.files.outputs.files }}" | while IFS= read -r f; do
            [ -z "$f" ] || [ ! -f "$f" ] && continue
            dir=".minified/$(dirname "$f")"
            mkdir -p "$dir"
            s3_key="${P}${f}"
            if [[ "$f" == *.js ]]; then
              npx --yes terser "$f" --compress passes=2 --mangle -o ".minified/$f"
              upload_with_retry aws s3 cp ".minified/$f" "s3://${BUCKET}/${s3_key}" --content-type "application/javascript" --cache-control "public, max-age=86400"
            else
              npx --yes clean-css-cli -o ".minified/$f" "$f"
              upload_with_retry aws s3 cp ".minified/$f" "s3://${BUCKET}/${s3_key}" --content-type "text/css" --cache-control "public, max-age=86400"
            fi
            echo "Uploaded $s3_key"
          done

      - name: Invalidate CloudFront (with retry)
        if: steps.files.outputs.has_files == 'true'
        env:
          DIST_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "Invalidation attempt $attempt/3..."
            if aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"; then
              echo "Invalidation created."
              exit 0
            fi
            [ $attempt -lt 3 ] && echo "Retrying in 15s..." && sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1

      - name: Verify deployment (optional)
        if: steps.files.outputs.has_files == 'true' && vars.DEPLOY_VERIFY_URL != ''
        env:
          BASE_URL: ${{ vars.DEPLOY_VERIFY_URL }}
        run: |
          verify_one() {
            local f="$1" url="$2" local_file="$3"
            tmp=$(mktemp)
            if ! curl -sS -f "$url" -o "$tmp"; then
              rm -f "$tmp"
              return 1
            fi
            if ! diff -q "$local_file" "$tmp" >/dev/null; then
              rm -f "$tmp"
              return 1
            fi
            rm -f "$tmp"
            return 0
          }
          echo "Verifying deployed files match local minified bundles (retries: 3)..."
          sleep 10
          for attempt in 1 2 3; do
            [ $attempt -gt 1 ] && echo "Retry $attempt/3, waiting 15s for cache..." && sleep 15
            all_ok=true
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              url="${BASE_URL%/}/${f}"
              local_file=".minified/$f"
              [ ! -f "$local_file" ] && echo "::error::Local minified file not found: $local_file" && exit 1
              if ! verify_one "$f" "$url" "$local_file"; then
                echo "Mismatch or fetch failed: $f"
                all_ok=false
              else
                echo "OK: $f"
              fi
            done <<< "${{ steps.files.outputs.files }}"
            [ "$all_ok" = true ] && echo "All files verified." && exit 0
          done
          echo "::error::Verification failed after 3 attempts (CloudFront may still be serving cached content)"
          exit 1

      - name: Summary
        if: steps.files.outputs.has_files == 'true'
        run: |
          echo "Deployed to S3 + CloudFront:"
          echo "${{ steps.files.outputs.files }}" | tr ' ' '\n' | grep -v '^$'
          echo ""
          echo "Base URL: CloudFront distribution domain or custom domain (e.g. https://assets.whiteswan.io/)"
          echo "Example: https://assets.whiteswan.io/white-swan-bubble-css-classification.js"